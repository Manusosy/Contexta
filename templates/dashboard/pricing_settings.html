{% extends "base.html" %}

{% block title %}Pricing Settings{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Pricing & Billing Settings</h1>
    <p class="text-slate-500 dark:text-slate-400">Configure global billing parameters and payment gateways.</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- General Settings -->
    <div class="lg:col-span-2">
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-slate-200 dark:border-slate-700">
            <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-6">General Billing</h2>
            <form action="{{ url_for('settings.save_billing') }}" method="POST"
                class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <!-- We post to save_billing -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">Default Currency</label>
                    <select name="currency"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 py-2.5 px-4 focus:ring-brand-500 dark:text-white">
                        <option value="USD" {% if s.get('currency')=='USD' %}selected{% endif %}>USD ($)</option>
                        <option value="EUR" {% if s.get('currency')=='EUR' %}selected{% endif %}>EUR (€)</option>
                        <option value="KES" {% if s.get('currency')=='KES' %}selected{% endif %}>KES (Sh)</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">Tax Percent (%)</label>
                    <input type="number" name="tax_percent" value="{{ s.get('tax_percent', '0') }}"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 py-2.5 px-4 focus:ring-brand-500 dark:text-white">
                </div>
                <!-- Submit -->
                <div class="md:col-span-2 flex justify-end">
                    <button type="submit"
                        class="bg-brand-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-brand-500 transition-colors shadow-lg shadow-brand-500/20">
                        Save General Settings
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- PayPal Settings -->
    <div class="space-y-6">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-slate-200 dark:border-slate-700 h-full">
            <div class="flex items-center gap-3 mb-6">
                <div
                    class="w-10 h-10 rounded-xl bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center overflow-hidden">
                    <!-- Official PayPal SVG logo -->
                    <svg viewBox="0 0 101 32" fill="none" class="w-16" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12.237 2.924h-6.56c-.45 0-.83.326-.9.77L2.36 23.886a.543.543 0 0 0 .536.63h3.132c.45 0 .83-.328.9-.771l.656-4.16c.068-.443.451-.77.9-.77h2.076c4.321 0 6.814-2.09 7.466-6.235.294-1.813.012-3.236-.836-4.235-.93-1.096-2.578-1.42-4.953-1.42zm.756 6.144c-.358 2.35-2.155 2.35-3.894 2.35h-.99l.694-4.394c.042-.262.267-.455.533-.455h.453c1.184 0 2.3 0 2.876.676.345.403.449 1.002.328 1.823zM29.576 8.997h-3.145c-.265 0-.49.193-.533.455l-.136.864-.217-.314c-.671-.973-2.167-1.298-3.661-1.298-3.426 0-6.35 2.596-6.918 6.237-.296 1.816.125 3.55 1.148 4.76.941 1.111 2.285 1.573 3.886 1.573 2.762 0 4.295-1.776 4.295-1.776l-.138.858a.543.543 0 0 0 .535.632h2.833c.45 0 .83-.328.9-.771l1.7-10.77a.543.543 0 0 0-.535-.63h-.014zm-4.338 6.028c-.3 1.773-1.71 2.963-3.505 2.963-.9 0-1.621-.29-2.082-.838-.458-.544-.63-1.32-.486-2.183.28-1.758 1.714-2.987 3.481-2.987.882 0 1.599.29 2.07.842.474.557.659 1.338.522 2.203zM44.33 8.997h-3.163c-.297 0-.576.148-.744.394l-4.296 6.326-1.82-6.079a.904.904 0 0 0-.868-.641h-3.106a.543.543 0 0 0-.516.715l3.428 10.06-3.225 4.549a.543.543 0 0 0 .442.859h3.16c.296 0 .573-.146.742-.39l10.353-14.943a.543.543 0 0 0-.437-.85h.05z"
                            fill="#253B80" />
                        <path
                            d="M54.05 2.924h-6.56c-.45 0-.83.326-.9.77l-2.417 15.192a.543.543 0 0 0 .536.63h3.358c.316 0 .584-.23.633-.543l.686-4.388c.068-.443.451-.77.9-.77h2.076c4.321 0 6.814-2.09 7.466-6.235.294-1.813.012-3.236-.836-4.235-.93-1.096-2.578-1.42-4.942-1.42h.001zm.756 6.144c-.358 2.35-2.155 2.35-3.894 2.35h-.99l.694-4.394c.042-.262.267-.455.533-.455h.453c1.184 0 2.3 0 2.876.676.345.403.449 1.002.328 1.823zm17.082-.071h-3.145c-.265 0-.49.193-.533.455l-.136.864-.217-.314c-.671-.973-2.167-1.298-3.661-1.298-3.426 0-6.35 2.596-6.918 6.237-.296 1.816.125 3.55 1.148 4.76.941 1.111 2.285 1.573 3.886 1.573 2.762 0 4.295-1.776 4.295-1.776l-.138.858a.543.543 0 0 0 .535.632h2.833c.45 0 .83-.328.9-.771l1.7-10.77a.543.543 0 0 0-.535-.63h-.014zm-4.338 6.028c-.3 1.773-1.71 2.963-3.505 2.963-.9 0-1.621-.29-2.082-.838-.458-.544-.63-1.32-.486-2.183.28-1.758 1.714-2.987 3.481-2.987.882 0 1.599.29 2.07.842.474.557.659 1.338.522 2.203zm6.95-11.604-2.454 15.626a.543.543 0 0 0 .535.631h2.712c.45 0 .83-.328.9-.771l2.42-15.192a.543.543 0 0 0-.536-.63h-3.04a.543.543 0 0 0-.537.336z"
                            fill="#179BD7" />
                        <path
                            d="M88.247 19.155c-.384 0-.756.083-1.09.243-.333.16-.62.39-.842.678-.223.287-.373.625-.437.984a2.177 2.177 0 0 0 .054.998c.118.388.347.743.652 1.017a2.57 2.57 0 0 0 1.594.548c.379 0 .75-.082 1.083-.243.334-.16.622-.391.845-.679a2.367 2.367 0 0 0 .387-1.975 2.213 2.213 0 0 0-.657-1.026 2.575 2.575 0 0 0-1.589-.545zm0 3.955c-.28 0-.553-.063-.797-.183a1.845 1.845 0 0 1-.616-.49 1.723 1.723 0 0 1-.318-.714 1.666 1.666 0 0 1 .04-.73c.088-.283.255-.542.478-.741.224-.2.497-.344.787-.42a1.869 1.869 0 0 1 1.683.378c.222.2.384.457.47.74.085.282.089.584.012.868a1.73 1.73 0 0 1-.448.754 1.838 1.838 0 0 1-1.291.538z"
                            fill="#253B80" />
                    </svg>
                </div>
                <h3 class="font-bold text-slate-900 dark:text-white">PayPal Integration</h3>
            </div>
            <form action="{{ url_for('settings.save_billing') }}" method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Mode</label>
                    <select name="paypal_mode" class="input-field">
                        <option value="sandbox" {% if s.paypal_mode=='sandbox' %}selected{% endif %}>Sandbox (Testing)
                        </option>
                        <option value="live" {% if s.paypal_mode=='live' %}selected{% endif %}>Live (Production)
                        </option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Client
                        ID</label>
                    <input type="password" name="paypal_client_id" value="{{ s.paypal_client_id or '' }}"
                        class="input-field" placeholder="Enter Client ID">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Secret
                        Key</label>
                    <input type="password" name="paypal_secret" value="{{ s.paypal_secret or '' }}" class="input-field"
                        placeholder="Enter Secret">
                </div>
                <button type="submit" class="w-full btn-primary py-3">Update PayPal Keys</button>
            </form>
        </div>
    </div>

    <!-- M-Pesa Settings -->
    <div class="space-y-6">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-slate-200 dark:border-slate-700 h-full">
            <div class="flex items-center gap-3 mb-6">
                <!-- M-Pesa brand badge -->
                <div class="w-10 h-10 rounded-xl overflow-hidden flex items-center justify-center bg-[#00A651]">
                    <svg viewBox="0 0 50 50" fill="none" class="w-7 h-7" xmlns="http://www.w3.org/2000/svg">
                        <text x="4" y="32" font-family="Arial Black, Arial" font-weight="900" font-size="22"
                            fill="white" letter-spacing="-1">M</text>
                        <rect x="24" y="21" width="22" height="12" rx="2" fill="white" />
                        <text x="25" y="31" font-family="Arial" font-weight="700" font-size="9"
                            fill="#00A651">PESA</text>
                    </svg>
                </div>
                <h3 class="font-bold text-slate-900 dark:text-white">M-Pesa (Daraja)</h3>
            </div>
            <form action="{{ url_for('settings.save_billing') }}" method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Environment</label>
                    <select name="mpesa_mode" class="input-field">
                        <option value="sandbox" {% if s.mpesa_mode=='sandbox' %}selected{% endif %}>Sandbox</option>
                        <option value="live" {% if s.mpesa_mode=='live' %}selected{% endif %}>Production</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Consumer
                        Key</label>
                    <input type="password" name="mpesa_consumer_key" value="{{ s.mpesa_consumer_key or '' }}"
                        class="input-field" placeholder="Enter Consumer Key">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Consumer
                        Secret</label>
                    <input type="password" name="mpesa_consumer_secret" value="{{ s.mpesa_consumer_secret or '' }}"
                        class="input-field" placeholder="Enter Consumer Secret">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Business
                        Shortcode</label>
                    <input type="text" name="mpesa_shortcode" value="{{ s.mpesa_shortcode or '' }}" class="input-field"
                        placeholder="e.g. 174379">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Passkey</label>
                    <input type="password" name="mpesa_passkey" value="{{ s.mpesa_passkey or '' }}" class="input-field"
                        placeholder="Lipa na M-Pesa Passkey">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Callback
                        URL</label>
                    <input type="url" name="mpesa_callback_url" value="{{ s.mpesa_callback_url or '' }}"
                        class="input-field" placeholder="https://yourdomain.com/api/mpesa/callback">
                </div>
                <button type="submit"
                    class="w-full bg-[#00A651] hover:bg-[#008a44] text-white py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-green-600/20">
                    Save M-Pesa Config
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
